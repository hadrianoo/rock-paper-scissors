<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors Game</title>
</head>

<body>
    <div id="choice">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
    </div>
    <div id="score">
        <div id="scoreboard"></div>
    </div>

    <script>

        let playerChoice = document.querySelector("#choice");
        let score = document.querySelector("#score");
        let scoreboard = document.querySelector("#scoreboard");

        playerChoice.addEventListener('click', (event) => {
            let target = event.target;
            switch (target.id) {
                case 'rock':
                    console.log("rock");
                    playRound('rock', getComputerChoice())
                    break;
                case 'paper':
                    console.log("paper");
                    playRound('paper', getComputerChoice())
                    break;
                case 'scissors':
                    console.log("scissors");
                    playRound('scissors', getComputerChoice())
                    break;
            }
        });

        let humanScore = 0;
        let computerScore = 0;

        function getComputerChoice() {
            let computerChoice = Math.floor(Math.random() * 3);
            console.log(computerChoice)
            if (computerChoice == 0) {
                return 'rock';
            } else if (computerChoice == 1) {
                return 'paper';
            } else {
                return 'scissors';
            }
        }

        function setUpperCase(text) {
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function printWon(human, computer) {
            let para = document.createElement("p");
            para.textContent = `You Won! ${setUpperCase(human)} beats ${setUpperCase(computer)}`;
            score.appendChild(para);
        }

        function printLose(human, computer) {
            let para = document.createElement("p");
            para.textContent = `You Lose! ${setUpperCase(computer)} beats ${setUpperCase(human)}`;
            score.appendChild(para);
        }

        function printDraw(choice) {
            let para = document.createElement("p");
            para.textContent = `Draw! You both choose ${setUpperCase(choice)}`;
            score.appendChild(para);
        }

        function playRound(humanChoice, computerChoice) {
            if (humanChoice == computerChoice) {
                humanScore += 1;
                computerScore += 1;
                printDraw(humanChoice);
            } else if (computerChoice == 'rock') {
                if (humanChoice == 'paper') {
                    humanScore += 1;
                    printWon(humanChoice, computerChoice);
                }
                if (humanChoice == 'scissors') {
                    computerScore += 1;
                    printLose(humanChoice, computerChoice);
                }
            } else if (computerChoice == 'paper') {
                if (humanChoice == 'rock') {
                    computerScore += 1;
                    printLose(humanChoice, computerChoice);
                }
                if (humanChoice == 'scissors') {
                    humanScore += 1;
                    printWon(humanChoice, computerChoice);
                }
            } else if (computerChoice == 'scissors') {
                if (humanChoice == 'rock') {
                    humanScore += 1;
                    printWon(humanChoice, computerChoice);
                }
                if (humanChoice == 'paper') {
                    computerScore += 1;
                    printLose(humanChoice, computerChoice);
                }
            }
            scoreboard.textContent = `Score: You ${humanScore} : Computer ${computerScore}`;
            if (humanScore >= 5 || computerScore >= 5) {
                let para = document.createElement("p");
                para.textContent = 'Game Over';
                scoreboard.appendChild(para);
                let paraStatus = document.createElement("p");
                if (humanScore > computerScore) {
                    paraStatus.textContent = `You Won!`;
                } else if (humanScore < computerScore) {
                    paraStatus.textContent = `You Lose!`;
                } else {
                    paraStatus.textContent = `Draw!`;
                }
                scoreboard.appendChild(paraStatus);
            }
        }

    </script>
</body>

</html>
