<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors Game</title>
</head>

<body>
    <script>
        function getComputerChoice() {
            if (getRandomInt() == 0) {
                return 'rock';
            } if (getRandomInt() == 1) {
                return 'paper';
            } else {
                return 'scissors';
            }
        }

        function getRandomInt() {
            return Math.floor(Math.random() * 3);
        }


        console.log(getComputerChoice())
    </script>

</body>

</html>
