<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors Game</title>
</head>

<body>
    <script>
        let humanScore = 0;
        let computerScore = 0;

        function getComputerChoice() {
            let computerChoice = Math.floor(Math.random() * 3);
            console.log(computerChoice)
            if (computerChoice == 0) {
                return 'rock';
            } else if (computerChoice == 1) {
                return 'paper';
            } else {
                return 'scissors';
            }
        }

        function getHumanChoice() {
            return prompt('rock, paper or scissors?').toLowerCase();
        }

        function setUpperCase(text) {
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function printWon(human, computer) {
            console.log(`You Won! ${setUpperCase(human)} beats ${setUpperCase(computer)}`);
        }

        function printLose(human, computer) {
            console.log(`You Lose! ${setUpperCase(computer)} beats ${setUpperCase(human)}`);
        }

        function playRound(humanChoice, computerChoice) {
            if (humanChoice == computerChoice) {
                humanScore += 1;
                computerScore += 1;
                console.log(`Draw! You both choose ${setUpperCase(humanChoice)}`)
            } else if (computerChoice == 'rock') {
                if (humanChoice == 'paper') {
                    humanScore += 1;
                    printWon(humanChoice, computerChoice);
                }
                if (humanChoice == 'scissors') {
                    computerScore += 1;
                    printLose(humanChoice, computerChoice);
                }
            } else if (computerChoice == 'paper') {
                if (humanChoice == 'rock') {
                    computerScore += 1;
                    printLose(humanChoice, computerChoice);
                }
                if (humanChoice == 'scissors') {
                    humanScore += 1;
                    printWon(humanChoice, computerChoice);
                }
            } else if (computerChoice == 'scissors') {
                if (humanChoice == 'rock') {
                    humanScore += 1;
                    printWon(humanChoice, computerChoice);
                }
                if (humanChoice == 'paper') {
                    computerScore += 1;
                    printLose(humanChoice, computerChoice);
                }
            }
        }

        function playGame() {
            for (let i = 0; i < 5; i++) {
                const humanSelection = getHumanChoice();
                const computerSelection = getComputerChoice();
                playRound(humanSelection, computerSelection);

            }
            console.log('Game Over')
            console.log(humanScore > computerScore ? 'You Won! Score: ' : humanScore < computerScore ? 'You Lose! Score: ' : 'Draw! Score: ');
            console.log(`${humanScore}:${computerScore}`);
        }
        playGame();
    </script>

</body>

</html>
